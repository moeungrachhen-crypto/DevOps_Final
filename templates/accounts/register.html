<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | ShopDevOps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background: linear-gradient(
                135deg,
                #0f172a,
                #111827,
                #000000
            );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:'Segoe UI',sans-serif;
        }

        .register-card{

            width:500px;
            background:rgba(17,24,39,.95);

            border:1px solid rgba(255,255,255,.1);

            border-radius:20px;

            padding:40px;

            box-shadow:
                0 0 30px rgba(0,0,0,.5);

            backdrop-filter:blur(10px);

        }

        .logo{
            text-align:center;
            margin-bottom:30px;
        }

        .logo h2{
            color:#22c55e;
            font-weight:700;
        }

        .logo p{
            color:#9ca3af;
        }

        .form-label{
            color:#e5e7eb;
            font-weight:500;
        }

        .form-control{

            background:#1f2937;
            border:1px solid #374151;
            color:white;
            height:50px;

        }

        .form-control:focus{

            background:#1f2937;
            color:white;

            border-color:#22c55e;

            box-shadow:
                0 0 0 .2rem rgba(34,197,94,.25);

        }

        .btn-register{

            height:52px;

            font-weight:600;

            border:none;

            border-radius:10px;

            background:linear-gradient(
                135deg,
                #16a34a,
                #22c55e
            );

        }

        .btn-register:hover{

            transform:translateY(-2px);

            transition:.3s;

        }

        .divider{
            border-color:#374151;
        }

        .text-muted-custom{
            color:#9ca3af;
        }

        .auth-link{
            color:#22c55e;
            text-decoration:none;
            font-weight:600;
        }

        .auth-link:hover{
            color:#4ade80;
        }

        .input-group-text{
            background:#1f2937;
            border:1px solid #374151;
            color:#9ca3af;
        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="logo">

        <h2>
            <i class="fas fa-cart-shopping"></i>
            ShopDevOps
        </h2>

        <p>
            Create your account
        </p>

    </div>

    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">

                Username

            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fas fa-user"></i>

                </span>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter username"
                    required>

            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Email

            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fas fa-envelope"></i>

                </span>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter email"
                    required>

            </div>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Password

            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fas fa-lock"></i>

                </span>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter password"
                    required>

            </div>

        </div>

        <div class="mb-4">

            <label class="form-label">

                Confirm Password

            </label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="fas fa-shield-halved"></i>

                </span>

                <input
                    type="password"
                    name="confirm_password"
                    class="form-control"
                    placeholder="Confirm password"
                    required>

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-success btn-register w-100">

            <i class="fas fa-user-plus"></i>
            Create Account

        </button>

    </form>

    <hr class="divider my-4">

    <p class="text-center text-muted-custom mb-0">

        Already have an account?

        <a href="{% url 'login' %}"
           class="auth-link">

            Login

        </a>

    </p>

</div>

</body>

</html>
