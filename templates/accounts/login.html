```html
<!DOCTYPE html>
<html lang="en">
<head>
s
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | ShopDevOps</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                135deg,
                #000000,
                #111827,
                #1f2937
            );

            font-family:'Segoe UI',sans-serif;
        }

        .login-card{
            width:450px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.1);

            border-radius:25px;

            padding:45px;

            box-shadow:
                0 10px 40px rgba(0,0,0,.5);
        }

        .logo{
            text-align:center;
            margin-bottom:30px;
        }

        .logo-icon{
            font-size:60px;
            color:#0d6efd;
        }

        .logo h1{
            color:white;
            font-weight:700;
            margin-top:10px;
        }

        .logo p{
            color:#cbd5e1;
        }

        .form-label{
            color:white;
            font-weight:500;
        }

        .form-control{
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.15);
            color:white;
            height:50px;
        }

        .form-control:focus{
            background:rgba(255,255,255,.12);
            color:white;
            border-color:#0d6efd;
            box-shadow:none;
        }

        .btn-login{
            height:50px;
            font-weight:600;
            border-radius:10px;
        }

        .footer-text{
            color:#cbd5e1;
        }

        .footer-text a{
            color:#0d6efd;
            text-decoration:none;
            font-weight:600;
        }

        .footer-text a:hover{
            text-decoration:underline;
        }

        hr{
            border-color:rgba(255,255,255,.1);
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        <i class="bi bi-cart4 logo-icon"></i>

        <h1>ShopDevOps</h1>

        <p>
            Login to your account
        </p>

    </div>

    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">

                Username

            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter username"
                   required>

        </div>

        <div class="mb-4">

            <label class="form-label">

                Password

            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter password"
                   required>

        </div>

        <button type="submit"
                class="btn btn-primary w-100 btn-login">

            <i class="bi bi-box-arrow-in-right"></i>

            Login

        </button>

    </form>

    <hr class="my-4">

    <p class="text-center footer-text">

        Don't have an account?

        <a href="{% url 'register' %}">
            Register
        </a>

    </p>

</div>

</body>
</html>
