{% extends 'base.html' %}

{% block title %}
{{ product.name }}
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6">

            {% if product.image %}
            <img src="{{ product.image.url }}"
                 class="img-fluid rounded">
            {% endif %}

        </div>

        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h3 class="text-success">
                ${{ product.price }}
            </h3>

            <p>
                {{ product.description }}
            </p>

            <p>
                Stock:
                <strong>
                    {{ product.stock }}
                </strong>
            </p>

            <a href="{% url 'add_to_cart' product.id %}"
                class="btn btn-primary">
                Add To Cart
            </a>

        </div>

    </div>

</div>

{% endblock %}
